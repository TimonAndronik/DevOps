replicaCount: 1

image:
  repository: task-tracker-backend
  tag: local
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

env:
  DATABASE_URL: "postgresql+psycopg2://postgres:postgres@postgres-postgresql:5432/task_tracker"

probes:
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 5
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10