version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: task-tracker-db
    environment:
      POSTGRES_DB: task_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d task_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: task-tracker-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/task_tracker
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: task-tracker-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
